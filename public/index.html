<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

    <h1>🔒 Secure Login System</h1>
    <p class="subtitle">Node.js · Express · Supabase</p>

    <div class="card">

        <h2>회원가입</h2>

        <form id="registerForm">

            <input
                type="text"
                id="registerUsername"
                placeholder="아이디"
                required>

            <input
                type="password"
                id="registerPassword"
                placeholder="비밀번호"
                required>

            <button type="submit">
                회원가입
            </button>

        </form>

        <hr>

        <h2>로그인</h2>

        <form id="loginForm">

            <input
                type="text"
                id="loginUsername"
                placeholder="아이디"
                required>

            <input
                type="password"
                id="loginPassword"
                placeholder="비밀번호"
                required>

            <button type="submit">
                로그인
            </button>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
