<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

    <h1>🔒 Secure Login System</h1>
    <p class="subtitle">Node.js · Express · Supabase</p>

    <div class="card">

        <h2>회원가입</h2>

        <form id="registerForm">
            <input type="text" id="registerUsername" placeholder="아이디" required>
            <input type="password" id="registerPassword" placeholder="비밀번호" required>
            <button type="submit">회원가입</button>
        </form>

        <hr>

        <h2>로그인</h2>

        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="아이디" required>
            <input type="password" id="loginPassword" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
        </form>

        <div id="captchaModal" style="display: none; margin-top: 20px; padding: 15px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; text-align: center;">
            <h3 style="margin-top: 0; font-size: 16px;">🤖 봇이 아님을 증명해주세요</h3>
            <div class="g-recaptcha" data-sitekey="6Ldm0FEtAAAAAPu7LiY_lt4681KqbcggF7yuGuIw" style="display: inline-block; margin-bottom: 10px;"></div>
            <br>
            <button type="button" onclick="verifyCaptcha()">캡차 인증 후 로그인</button>
        </div>

    </div>

</div>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script src="fingerprint.js"></script>
<script src="script.js"></script>

</body>
</html>
